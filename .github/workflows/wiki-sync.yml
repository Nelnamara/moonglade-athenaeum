name: Sync wiki

# Owner decision D-10 (docs/AUDIT_2026-07-21.md): the published GitHub wiki drifted 4
# releases / 6 days stale before being caught and fixed by hand (a74b0d1). This replaces
# that manual step so it can't happen a second time -- every release tag re-pushes
# wiki/*.md to the wiki repo automatically.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # lets this be smoke-tested once by hand, without waiting for a real release

permissions:
  contents: write   # this repo's default GITHUB_TOKEN permission is read-only
                     # (gh api repos/.../actions/permissions/workflow -> "read"), so every
                     # job that needs to push must say so explicitly, right here.

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the main repo (source of truth is wiki/*.md)
        uses: actions/checkout@v7

      - name: Clone the published wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Mirror wiki/ over the published wiki (replace, don't just overlay)
        run: |
          rm -f wiki-repo/*.md
          cp wiki/*.md wiki-repo/

      - name: Commit and push only if something actually changed
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already matches wiki/ -- nothing to push."
          else
            git commit -m "Sync wiki from wiki/ source (${{ github.ref_name }})"
            git push origin master
          fi
